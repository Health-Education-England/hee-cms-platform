name: CI

# Continuous Integration on develop, release/** & master branches will be done part of Continuous Deployment workflow
on:
  push:
    branches-ignore:
      - 'master'

jobs:
  buildAndTest:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      BLOOMREACH_MVN_USERNAME: ${{ secrets.BLOOMREACH_MVN_USERNAME }}
      BLOOMREACH_MVN_PASSWORD: ${{ secrets.BLOOMREACH_MVN_PASSWORD }}

    steps:
      - name: Check out repo.
        uses: actions/checkout@v6  # Node24-capable major 【3-6a53d0】

      - name: Set up JDK 17 (with Maven auth)
        uses: actions/setup-java@v5  # Updated to Node24 internally 【4-65ce2e】
        with:
          distribution: 'zulu'
          java-version: 17
          # Creates ~/.m2/settings.xml server entry for auth 【5-4ce7fa】
          server-id: hippo-maven2-enterprise
          server-username: BLOOMREACH_MVN_USERNAME
          server-password: BLOOMREACH_MVN_PASSWORD

      - name: Cache maven packages
        uses: actions/cache@v5  # Runs on Node24 runtime 【2-6e95d6】
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Compile
        run: mvn -B clean compile -Pdefault --file pom.xml

      - name: Test
        run: mvn -B clean test -Pdefault --file pom.xml